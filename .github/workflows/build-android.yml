name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend with env vars
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Add Capacitor Android platform
        working-directory: frontend
        run: npx cap add android || true

      - name: Sync Capacitor Android
        working-directory: frontend
        run: npx cap sync android

      - name: Build Android APK (Release)
        if: github.event.inputs.build_type != 'debug' || github.ref_type == 'tag'
        working-directory: frontend/android
        run: ./gradlew assembleRelease

      - name: Build Android APK (Debug)
        if: github.event.inputs.build_type == 'debug' && github.ref_type != 'tag'
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      - name: Find APK files
        id: find-apk
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            APK_PATH=$(find frontend/android -name "*.apk" -path "*/debug/*" | head -1)
          else
            APK_PATH=$(find frontend/android -name "*.apk" -path "*/release/*" | head -1)
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Generate version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v1.0.0-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "OpenCode Mobile ${{ steps.version.outputs.tag }}"
          body: |
            ## OpenCode Mobile Cloud
            
            AI coding platform for Android with Daytona sandboxes.
            
            ### What's New
            - Build APK from source
            - Approval mode for code review
            
            ### Installation
            1. Download the APK below
            2. Enable "Install from unknown sources" on your Android device
            3. Install and open the app
          files: ${{ steps.find-apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
